<!-- screens/stock-management/verify-student-submission.html -->
<div class="page-header">
    <h2 style="text-align: center; color: #2e3192;">VERIFY STUDENT SUBMISSION</h2>
</div>

<div class="vss-wrapper">
    <!-- Info Message (centered) -->
    <div class="vss-info-msg" style="text-align: center;">
        Simply Tick on your left to indicate that a student has submitted items requested from them.
    </div>

    <!-- Toolbar Row 1: Search + Refresh + Select Items + Date -->
    <div class="vss-toolbar">
        <div class="vss-toolbar-left">
            <input type="text" id="VSS_GLOBAL_SEARCH" class="global-search" placeholder="Search a student here..." style="width: 200px;">
            <button class="wd-action-btn" id="BTN_VSS_Refresh" style="padding: 4px 12px; height: 28px;">
                Refresh
            </button>
        </div>
        <div class="vss-toolbar-right">
            <label style="font-size: 12px; white-space: nowrap;">Select Items:</label>
            <select id="VSS_Filter_SelectItems" class="vss-filter-select">
                <option>AA REALM O+</option>
            </select>
            <label style="font-size: 12px; white-space: nowrap;">Date</label>
            <input type="date" id="VSS_Filter_Date" class="vss-filter-select" style="width: 140px;">
        </div>
    </div>

    <!-- Toolbar Row 2: Advance Filtering Options -->
    <div class="vss-toolbar vss-filter-bar">
        <span class="vss-filter-label">Advance Filtering options:</span>
        <div class="vss-filter-group">
            <label>Batch/Years:</label>
            <select id="VSS_Filter_BatchYear" class="vss-filter-select">
                <option value="">---All---</option>
            </select>
        </div>
        <div class="vss-filter-group">
            <label>School Level:</label>
            <select id="VSS_Filter_SchoolLevel" class="vss-filter-select">
                <option value="">---All---</option>
            </select>
        </div>
        <div class="vss-filter-group">
            <label>School Type:</label>
            <select id="VSS_Filter_SchoolType" class="vss-filter-select">
                <option value="">---All---</option>
            </select>
        </div>
        <div class="vss-filter-group">
            <label>Specialty:</label>
            <select id="VSS_Filter_Specialty" class="vss-filter-select">
                <option value="">---All---</option>
            </select>
        </div>
    </div>

    <!-- Table -->
    <div class="table-scroll-wrapper" style="flex: 1; background: #fff; border: 1px solid #ccc;">
        <table class="wd-table stock-table" id="TABLE_VerifySubmission">
            <thead>
                <tr>
                    <th style="width: 35px; text-align: center;"><input type="checkbox" id="VSS_SelectAll" title="Select All"></th>
                    <th style="width: 80px;">Status <i class="fa-solid fa-sort"></i></th>
                    <th style="width: auto;">Student Names</th>
                    <th style="width: 120px;">Matricule <i class="fa-solid fa-sort"></i></th>
                    <th style="width: 100px;">Phone</th>
                    <th style="width: 120px;">Specialty <i class="fa-solid fa-sort"></i></th>
                    <th style="width: 100px;">School Levels</th>
                    <th style="width: 110px;">School Type <i class="fa-solid fa-sort"></i></th>
                    <th style="width: 80px;">Items <i class="fa-solid fa-sort"></i></th>
                </tr>
            </thead>
            <tbody id="VSS_TBODY">
                <!-- Populated by js/verify-student-submission.js -->
            </tbody>
        </table>
    </div>
</div>
