<!-- screens/stock-management/stock-new.html -->
<div id="MODAL_InventoryItem" class="coa-modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10005; align-items: center; justify-content: center;">
    <div class="coa-modal" style="width: 580px; max-width: 95%; background: #f0f0f0; border-radius: 6px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; max-height: 95vh; overflow-y: auto;">
        <div class="coa-modal-header" id="MIG_ItemHeader" style="background: #2e3192; color: white; padding: 10px 15px; font-weight: bold; border-radius: 6px 6px 0 0; display: flex; justify-content: space-between; align-items: center; cursor: move;">
            <span id="MIG_ItemTitle">New Inventory Item</span>
            <div style="font-size: 22px; color: #fff; opacity: 0.8; cursor: pointer;" onclick="InventoryItemModalManager.closeModal()">&times;</div>
        </div>
        <div class="coa-modal-body" style="padding: 15px; background: #fff;">
            <form id="MIG_ItemForm" onsubmit="event.preventDefault();" style="display: flex; flex-direction: column; gap: 4px;">
                <div class="form-row-setup"><label>Item Name:</label><input type="text" id="MIG_ItemName" class="wd-input-setup" placeholder="e.g. Printer Paper A4" required></div>
                <div class="form-row-setup"><label>Barcode:</label><input type="text" id="MIG_ItemBarcode" class="wd-input-setup"></div>
                
                <div class="form-row-pair">
                    <div class="form-row-setup"><label>Total Quantity:</label><input type="number" id="MIG_ItemQty" class="wd-input-setup text-right" value="0" min="0"></div>
                    <div class="form-row-setup"><label>Selling Price:</label><input type="number" id="MIG_ItemSellPrice" class="wd-input-setup text-right" value="0" min="0"></div>
                </div>
                
                <div class="form-row-pair">
                    <div class="form-row-setup"><label>Purchase Price:</label><input type="number" id="MIG_ItemBuyPrice" class="wd-input-setup text-right" value="0" min="0"></div>
                    <div class="form-row-setup"><label>Min Stock Level:</label><input type="number" id="MIG_ItemMinStock" class="wd-input-setup text-right" value="0" min="0"></div>
                </div>

                <div class="form-row-pair">
                    <div class="form-row-setup"><label>Min Qty 1:</label><input type="number" id="MIG_ItemMinQty1" class="wd-input-setup text-right" value="0" min="0"></div>
                    <div class="form-row-setup"><label>Min Price 1:</label><input type="number" id="MIG_ItemMinPrice1" class="wd-input-setup text-right" value="0" min="0"></div>
                </div>
                
                <div class="form-row-pair">
                    <div class="form-row-setup"><label>Min Qty 2:</label><input type="number" id="MIG_ItemMinQty2" class="wd-input-setup text-right" value="0" min="0"></div>
                    <div class="form-row-setup"><label>Min Price 2:</label><input type="number" id="MIG_ItemMinPrice2" class="wd-input-setup text-right" value="0" min="0"></div>
                </div>

                <div class="form-row-setup">
                    <label>Main Category:</label>
                    <div style="display: flex; gap: 5px; flex: 1;">
                        <select id="MIG_ItemMainCat" class="wd-input-setup" style="flex: 1;"></select>
                        <button type="button" class="wd-btn primary" style="padding: 2px 8px;" onclick="InventoryModalManager.handleNewCategory('main-category')"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <div class="form-row-setup">
                    <label>Sub Category:</label>
                    <div style="display: flex; gap: 5px; flex: 1;">
                        <select id="MIG_ItemSubCat" class="wd-input-setup" style="flex: 1;"></select>
                        <button type="button" class="wd-btn primary" style="padding: 2px 8px;" onclick="InventoryModalManager.handleNewCategory('sub-category')"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
            </form>
        </div>
        <div class="coa-modal-footer" style="padding: 8px 15px; background: #f0f0f0; border-top: 1px solid #ddd; text-align: right; display: flex; justify-content: center; gap: 15px; border-radius: 0 0 6px 6px;">
            <button class="wd-action-btn primary" id="MIG_ItemSaveBtn" style="min-width: 140px;" onclick="InventoryItemModalManager.handleSave()">Validate <i class="fa-solid fa-circle-check"></i></button>
            <button class="wd-action-btn danger" style="min-width: 140px;" onclick="InventoryItemModalManager.closeModal()">Close <i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>
</div>
<style>
    .form-row-setup { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .form-row-setup label { width: 100px; text-align: right; font-weight: 500; color: #333; font-size: 12px; }
    .wd-input-setup { flex: 1; padding: 4px 8px; border: 1px solid #ccc; border-radius: 2px; outline: none; font-size: 12px; min-width: 0; }
    .wd-input-setup:focus { border-color: #2e3192; background-color: #fcfdff; }
    .text-right { text-align: right; }

    .form-row-pair { display: flex; gap: 10px; align-items: center; }
    .form-row-pair .form-row-setup { flex: 1; margin-bottom: 4px; }
    .form-row-pair .form-row-setup label { width: 90px; }

    .wd-btn { padding: 4px 10px; border: 1px solid #999; background: #f0f0f0; cursor: pointer; font-size: 11px; display: inline-flex; align-items: center; gap: 4px; border-radius: 2px; }
    .wd-btn.primary { background: #2e3192 !important; color: #fff !important; border-color: #2e3192; font-weight: bold; }
    
    .wd-action-btn { padding: 8px 20px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; border: 1px solid #ccc; font-size: 12px; }
    .wd-action-btn.primary { background: #2e3192; color: #fff; border-color: #2e3192; }
    .wd-action-btn.danger { background: #cd2027; color: #fff; border-color: #cd2027; }
</style>
