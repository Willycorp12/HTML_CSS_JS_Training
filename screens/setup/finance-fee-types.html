<!-- screens/setup/finance-fee-types.html -->
<div class="page-header">
    <h2>Fee Types Setup</h2>
</div>
<div style="text-align: center; font-size: 12px; color: #666; margin-top: 4px; margin-bottom: 10px;">Configure and Manage Fee Types by Category and School Type</div>

<div class="types-container">
    <div class="coa-toolbar" style="padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; background: #f8f9fc; border-bottom: 1px solid #ccc;">
        <div class="coa-left-tools" style="display: flex; gap: 15px; align-items: center;">
            <div style="display: flex; align-items: center; gap: 5px; font-size: 12px;">
                <label style="font-weight: bold; color: #333;">Institution Type:</label>
                <select id="FT_SelectInstType" class="wd-input-setup" style="width: 260px; padding: 4px; border: 1px solid #ccc; border-radius: 2px;">
                    <option value="SCHOOL OF MANAGEMENT SCIENCES">SCHOOL OF MANAGEMENT SCIENCES</option>
                    <option value="SCHOOL OF HEALTH AND MEDICAL SCIENCES">SCHOOL OF HEALTH AND MEDICAL SCIENCES</option>
                    <option value="SCHOOL OF INFORMATION TECHNOLOGY">SCHOOL OF INFORMATION TECHNOLOGY</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 5px; font-size: 12px;">
                <input type="text" id="FT_SearchInput" placeholder="Search by Fee Name..." style="width: 200px; padding: 5px; border: 1px solid #ccc; border-radius: 2px; font-size: 12px; box-sizing: border-box;">
            </div>
        </div>
        <div class="coa-right-tools" style="display: flex; gap: 8px;">
            <button class="wd-action-btn primary" onclick="FeeTypesManager.openNew()">
                New <i class="fa-solid fa-plus-circle"></i>
            </button>
            <button class="wd-action-btn primary" onclick="FeeTypesManager.openModify()">
                Modify <i class="fa-solid fa-pen"></i>
            </button>
            <button class="wd-action-btn danger" onclick="FeeTypesManager.handleDelete()">
                Delete <i class="fa-solid fa-circle-minus"></i>
            </button>
        </div>
    </div>

    <div class="types-content-row">
        <div class="types-table-wrapper">
            <table class="wd-table types-table">
                <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;"><input type="checkbox" id="FT_HeaderCheckbox"></th>
                        <th>Fee.Name</th>
                        <th>Description</th>
                        <th style="width: 150px; text-align: right;">Amount</th>
                        <th>Linked Account</th>
                    </tr>
                </thead>
                <tbody id="TB_FeeTypes">
                    <!-- Populated by finance-fee-types.js -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal for New/Modify Fee Type -->
<div id="MODAL_FeeType" class="coa-modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10005; align-items: center; justify-content: center;">
    <div class="coa-modal" style="width: 520px; background: #f0f0f0; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); overflow: hidden; border: 1px solid #888;">
        <!-- Modal Header -->
        <div class="coa-modal-header" id="MFT_Header" style="background: #2e3192; color: white; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: move; user-select: none;">
            <div id="MFT_Title" style="font-size: 14px;">New Fee Type</div>
            <div style="font-size: 22px; color: #fff; opacity: 0.8; cursor: pointer; padding: 0 5px;" onclick="FeeTypesManager.closeModal()" onmousedown="event.stopPropagation()">&times;</div>
        </div>
        <!-- Modal Body -->
        <div class="coa-modal-body" style="padding: 25px; background: #fff;">
            <form id="MFT_Form" onsubmit="event.preventDefault();" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="form-row-setup align-start">
                    <label style="width: 120px; font-size: 13px; font-weight: bold; color: #333; padding-top: 5px;">Fee Name:</label>
                    <textarea id="MFT_FeeName" class="wd-input-setup" style="height: 50px; font-family: inherit; font-size: 12px; resize: vertical; padding: 5px 8px; border: 1px solid #aaa; border-radius: 1px;" placeholder="Enter fee name..."></textarea>
                </div>
                <div class="form-row-setup">
                    <label style="width: 120px; font-size: 13px; font-weight: bold; color: #333;">Description:</label>
                    <input type="text" id="MFT_Description" class="wd-input-setup" placeholder="Enter description..." style="padding: 5px 8px; border: 1px solid #aaa; border-radius: 1px; font-size: 12px;">
                </div>
                <div class="form-row-setup">
                    <label style="width: 120px; font-size: 13px; font-weight: bold; color: #333;">School Type:</label>
                    <select id="MFT_SchoolType" class="wd-input-setup" style="padding: 5px 8px; border: 1px solid #aaa; border-radius: 1px; font-size: 12px;">
                        <option value="SCHOOL OF MANAGEMENT SCIENCES">SCHOOL OF MANAGEMENT SCIENCES</option>
                        <option value="SCHOOL OF HEALTH AND MEDICAL SCIENCES">SCHOOL OF HEALTH AND MEDICAL SCIENCES</option>
                        <option value="SCHOOL OF INFORMATION TECHNOLOGY">SCHOOL OF INFORMATION TECHNOLOGY</option>
                    </select>
                </div>
                <div class="form-row-setup">
                    <label style="width: 120px; font-size: 13px; font-weight: bold; color: #333;">Fee Category:</label>
                    <select id="MFT_Category" class="wd-input-setup" style="padding: 5px 8px; border: 1px solid #aaa; border-radius: 1px; font-size: 12px;">
                        <!-- Populated from window.feeCategories -->
                    </select>
                </div>
                <div class="form-row-setup">
                    <label style="width: 120px; font-size: 13px; font-weight: bold; color: #333;">Amount:</label>
                    <div style="display: flex; align-items: center; border: 1px solid #aaa; border-radius: 1px; flex: 1; padding: 2px;">
                        <input type="text" id="MFT_Amount" class="wd-input-setup" style="border: none; padding: 4px; text-align: right; font-weight: bold; width: 100%;" placeholder="0">
                        <span style="font-size: 11px; padding: 0 5px; color: #666; font-weight: bold;">FCFA</span>
                    </div>
                </div>
                <div class="form-row-setup">
                    <label style="width: 120px; font-size: 13px; font-weight: bold; color: #333;">Linked Account:</label>
                    <select id="MFT_AccountSelect" class="wd-input-setup" style="padding: 5px 8px; border: 1px solid #aaa; border-radius: 1px; font-size: 12px;">
                        <!-- Will hold general ledger account mappings -->
                    </select>
                </div>
            </form>
        </div>
        <!-- Modal Footer -->
        <div class="coa-modal-footer" style="padding: 12px; background: #f5f5f5; border-top: 1px solid #ddd; text-align: right; display: flex; justify-content: center; gap: 15px;">
            <button class="wd-btn primary" style="padding: 10px 40px; min-width: 120px;" onclick="FeeTypesManager.handleSave()">
                Validate <i class="fa-solid fa-circle-check"></i>
            </button>
            <button class="wd-btn danger" style="padding: 10px 40px; min-width: 120px;" onclick="FeeTypesManager.closeModal()">
                Cancel <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>
</div>

<style>
    .types-container {
        height: calc(100% - 75px);
        border: 1px solid #ccc;
        background: #fff;
        display: flex;
        flex-direction: column;
        font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    
    .types-content-row {
        flex: 1;
        overflow: hidden;
        border-top: 2px solid #2e3192;
    }
    
    .types-table-wrapper {
        height: 100%;
        overflow: auto;
    }
    
    .types-table {
        width: 100%;
        border-collapse: collapse;
    }
    
    .types-table thead th {
        background: #2e3192;
        color: #fff;
        padding: 10px;
        text-align: left;
        position: sticky;
        top: 0;
        z-index: 10;
        border-right: 1px solid #1f226f;
        font-size: 13px;
        font-weight: 600;
    }
    
    .types-table tbody tr.group-header-row td {
        background-color: #e2eafc;
        color: #2e3192;
        font-weight: bold;
        font-size: 13px;
        cursor: pointer;
        padding: 6px 10px;
        border-bottom: 1px solid #b4c7e7;
    }
    
    .types-table tbody tr.group-header-row td i {
        margin-right: 6px;
        transition: transform 0.2s;
    }
    
    .types-table tbody tr.group-header-row.collapsed td i {
        transform: rotate(-90deg);
    }
    
    .types-table tbody td {
        padding: 6px 8px;
        border-bottom: 1px solid #b4c7e7;
        border-right: 1px solid #b4c7e7;
        font-size: 13px;
        color: #000;
        height: 32px;
        vertical-align: middle;
    }
    
    .types-table tr.fee-item-row:nth-child(even) {
        background-color: #f2f7ff;
    }
    
    .types-table tr.fee-item-row.selected td {
        background-color: #cd2027 !important;
        color: #fff !important;
    }
    
    .types-table tr.fee-item-row:hover:not(.selected) td {
        background-color: #e6f1ff;
    }
    
    .form-row-setup {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .form-row-setup.align-start {
        align-items: flex-start;
    }
    .form-row-setup label {
        width: 120px;
        font-size: 12px;
        color: #333;
    }
    .wd-input-setup {
        flex: 1;
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 2px;
        font-size: 12px;
    }
    .wd-btn {
        border-radius: 4px;
        cursor: pointer;
        transition: 0.2s;
        border: 1px solid #ccc;
        background: #fff;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
    }
    .wd-btn.primary {
        background: #2e3192 !important;
        color: #fff !important;
        border-color: #2e3192 !important;
        font-weight: bold;
    }
    .wd-btn.danger {
        background: #cd2027 !important;
        color: #fff !important;
        border-color: #cd2027 !important;
        font-weight: bold;
    }
</style>
