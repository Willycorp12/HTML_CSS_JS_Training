<!-- screens/setup/setup-sms.html -->
<div class="page-header">
    <h2 style="color: #2e3192; margin-left: 20px;">SMS Setting</h2>
</div>

<div class="sms-container">
    <div class="sms-body">
        <div id="SMS_ConfigBox" class="coa-modal"
            style="width: 480px; background: #fff; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); overflow: hidden; border: 1px solid #888; margin: 20px auto; position: relative;">
            <div class="coa-modal-header" id="SMS_Header"
                style="background: #2e3192; color: white; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: move; user-select: none;">
                <div style="font-weight: bold; font-size: 14px;">Bulk SMS Config</div>
                <div style="font-size: 22px; color: #fff; opacity: 0.8; cursor: pointer; padding: 0 5px;"
                    onclick="this.closest('.coa-modal').style.display='none'" onmousedown="event.stopPropagation()">
                    &times;</div>
            </div>
            <div class="coa-modal-body" style="padding: 25px; background: #fff;">
                <form onsubmit="event.preventDefault();" style="display: flex; flex-direction: column; gap: 15px;">
                    <div class="form-row-setup">
                        <label style="width: 120px;">Sender ID:</label>
                        <input type="text" class="wd-input-setup" value="MIKE DENNY">
                        <div style="font-size: 11px; width: 100px; padding-left: 10px;">Cost/SMS: <span
                                style="font-weight: bold;">0 Frs</span></div>
                    </div>
                    <div class="form-row-setup">
                        <label style="width: 120px;">Account Phone No:</label>
                        <input type="text" class="wd-input-setup" value="237 690614834">
                    </div>
                    <div class="form-row-setup">
                        <label style="width: 120px;">Password:</label>
                        <input type="text" class="wd-input-setup" value="As12+-" style="background: #ffffcc;">
                    </div>

                    <div style="display: flex; justify-content: center; gap: 20px; margin-top: 15px;">
                        <button class="wd-btn primary" style="padding: 10px 40px; min-width: 120px;">Send <i
                                class="fa-solid fa-paper-plane"></i></button>
                        <button class="wd-btn danger" style="padding: 10px 40px; min-width: 120px;"
                            onclick="document.getElementById('SMS_ConfigBox').style.display='none'">Cancel <i
                                class="fa-solid fa-xmark"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .sms-container {
        height: calc(100% - 60px);
        border: 1px solid #ccc;
        background: #dcdcdc;
        display: flex;
        flex-direction: column;
    }

    /* Removed position:relative from sms-body to fix modal dragging offset calculation */
    .sms-body {
        flex: 1;
    }

    .wd-btn {
        border-radius: 4px;
        cursor: pointer;
        transition: 0.2s;
        border: 1px solid #ccc;
        background: #fff;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
    }

    .wd-btn.primary {
        background: #2e3192 !important;
        color: #fff !important;
        border-color: #2e3192 !important;
        font-weight: bold;
    }

    .wd-btn.danger {
        background: #cd2027 !important;
        color: #fff !important;
        border-color: #cd2027 !important;
        font-weight: bold;
    }

    .form-row-setup {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .wd-input-setup {
        flex: 1;
        padding: 4px 6px;
        border: 1px solid #aaa;
        border-radius: 1px;
        font-size: 12px;
    }
</style>
