<!-- screens/setup/finance-annual-fee.html -->
<div class="page-header">
    <h2>Annual Fee Composition</h2>
</div>
<div style="text-align: center; font-size: 12px; color: #666; margin-top: 4px; margin-bottom: 10px;">Configure Annual Fee Composition by Class and Year</div>

<div class="fee-container">
    <div class="coa-toolbar" style="padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; background: #f8f9fc; border-bottom: 1px solid #ccc;">
        <div class="coa-left-tools" style="display: flex; gap: 15px; align-items: center;">
            <div style="display: flex; align-items: center; gap: 5px; font-size: 12px;">
                <label style="font-weight: bold; color: #333;">Batch/Year:</label>
                <select id="FEE_SelectBatch" class="wd-input-setup" style="width: 220px; padding: 4px;">
                    <!-- Populated dynamically -->
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 5px; font-size: 12px;">
                <label style="font-weight: bold; color: #333;">Institution Type:</label>
                <select id="FEE_SelectInstType" class="wd-input-setup" style="width: 260px; padding: 4px;">
                    <option value="SCHOOL OF MANAGEMENT SCIENCES">SCHOOL OF MANAGEMENT SCIENCES</option>
                    <option value="SCHOOL OF HEALTH AND MEDICAL SCIENCES">SCHOOL OF HEALTH AND MEDICAL SCIENCES</option>
                    <option value="SCHOOL OF INFORMATION TECHNOLOGY">SCHOOL OF INFORMATION TECHNOLOGY</option>
                </select>
            </div>
        </div>
        <div class="coa-right-tools">
            <button class="wd-action-btn primary" id="BTN_ModifyFeeComposition">
                Modify Fee Composition <i class="fa-solid fa-pen"></i>
            </button>
        </div>
    </div>

    <div class="fee-content-row">
        <div class="fee-table-wrapper">
            <table class="wd-table fee-table">
                <thead>
                    <tr>
                        <th style="width: 60px; text-align: center;">No</th>
                        <th style="width: 350px;">Class Name</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody id="TB_AnnualFeeComposition">
                    <!-- Populated by finance-annual-fee.js -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal for Modifying Annual Fee Composition -->
<div id="MODAL_FeeComposition" class="coa-modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10005; align-items: center; justify-content: center;">
    <div class="coa-modal" style="width: 520px; background: #f0f0f0; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); overflow: hidden; border: 1px solid #888;">
        <div class="coa-modal-header" id="MFC_Header" style="background: #2e3192; color: white; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: move; user-select: none;">
            <div id="MFC_Title" style="font-size: 14px;">Modify Fee Composition</div>
            <div style="font-size: 22px; color: #fff; opacity: 0.8; cursor: pointer; padding: 0 5px;" onclick="FeeCompositionModalManager.closeModal()" onmousedown="event.stopPropagation()">&times;</div>
        </div>
        <div class="coa-modal-body" style="padding: 25px; background: #fff;">
            <form id="MFC_Form" onsubmit="event.preventDefault();" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="form-row-setup">
                    <label style="width: 120px; font-size: 13px; font-weight: bold; color: #333;">Class Name:</label>
                    <input type="text" id="MFC_ClassName" class="wd-input-setup" readonly style="background: #e9ecef; cursor: not-allowed; padding: 5px 8px; border: 1px solid #aaa; border-radius: 1px; font-size: 12px;">
                </div>
                <div class="form-row-setup align-start">
                    <label style="width: 120px; font-size: 13px; font-weight: bold; color: #333; padding-top: 5px;">Description:</label>
                    <textarea id="MFC_Description" class="wd-input-setup" style="height: 100px; font-family: inherit; font-size: 12px; resize: vertical; padding: 5px 8px; border: 1px solid #aaa; border-radius: 1px;"></textarea>
                </div>
            </form>
        </div>
        <div class="coa-modal-footer" style="padding: 12px; background: #f5f5f5; border-top: 1px solid #ddd; text-align: right; display: flex; justify-content: center; gap: 15px;">
            <button class="wd-btn primary" style="padding: 10px 40px; min-width: 120px;" id="BTN_SaveFeeComposition">
                Validate <i class="fa-solid fa-circle-check"></i>
            </button>
            <button class="wd-btn danger" style="padding: 10px 40px; min-width: 120px;" onclick="FeeCompositionModalManager.closeModal()">
                Cancel <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>
</div>

<style>
    .fee-container {
        height: calc(100% - 75px);
        border: 1px solid #ccc;
        background: #fff;
        display: flex;
        flex-direction: column;
        font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    
    .fee-content-row {
        flex: 1;
        overflow: hidden;
        border-top: 2px solid #2e3192;
    }
    
    .fee-table-wrapper {
        height: 100%;
        overflow: auto;
    }
    
    .fee-table {
        width: 100%;
        border-collapse: collapse;
    }
    
    .fee-table thead th {
        background: #2e3192;
        color: #fff;
        padding: 10px;
        text-align: left;
        position: sticky;
        top: 0;
        z-index: 10;
        border-right: 1px solid #1f226f;
        font-size: 13px;
        font-weight: 600;
    }
    
    .fee-table tbody td {
        padding: 6px 8px;
        border-bottom: 1px solid #b4c7e7;
        border-right: 1px solid #b4c7e7;
        font-size: 13px;
        color: #000;
        height: 32px;
        vertical-align: middle;
    }
    
    .fee-table tr:nth-child(even) {
        background-color: #f2f7ff;
    }
    
    .fee-table tr.selected td {
        background-color: #cd2027 !important;
        color: #fff !important;
    }
    
    .fee-table tr:hover:not(.selected) td {
        background-color: #e6f1ff;
    }
    
    .form-row-setup {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .form-row-setup.align-start {
        align-items: flex-start;
    }
    .form-row-setup label {
        width: 120px;
        font-size: 12px;
        color: #333;
    }
    .wd-input-setup {
        flex: 1;
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 2px;
        font-size: 12px;
    }
    .wd-btn {
        border-radius: 4px;
        cursor: pointer;
        transition: 0.2s;
        border: 1px solid #ccc;
        background: #fff;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
    }
    .wd-btn.primary {
        background: #2e3192 !important;
        color: #fff !important;
        border-color: #2e3192 !important;
        font-weight: bold;
    }
    .wd-btn.danger {
        background: #cd2027 !important;
        color: #fff !important;
        border-color: #cd2027 !important;
        font-weight: bold;
    }
</style>
