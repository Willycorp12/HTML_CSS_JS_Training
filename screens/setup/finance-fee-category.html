<!-- screens/setup/finance-fee-category.html -->
<div class="page-header">
    <h2>Fee Category Setup</h2>
</div>
<div style="text-align: center; font-size: 12px; color: #666; margin-top: 4px; margin-bottom: 10px;">Configure and Manage Fee Categories</div>

<div class="category-container">
    <div class="coa-toolbar" style="padding: 8px 10px; display: flex; justify-content: flex-end; align-items: center; background: #f8f9fc; border-bottom: 1px solid #ccc;">
        <div class="coa-right-tools" style="display: flex; gap: 8px;">
            <button class="wd-action-btn primary" onclick="FeeCategoryManager.openNew()">
                New <i class="fa-solid fa-plus-circle"></i>
            </button>
            <button class="wd-action-btn primary" onclick="FeeCategoryManager.openModify()">
                Modify <i class="fa-solid fa-pen"></i>
            </button>
            <button class="wd-action-btn danger" onclick="FeeCategoryManager.handleDelete()">
                Delete <i class="fa-solid fa-circle-minus"></i>
            </button>
        </div>
    </div>

    <div class="category-content-row">
        <div class="category-table-wrapper">
            <table class="wd-table category-table">
                <thead>
                    <tr>
                        <th style="width: 80px; text-align: center;">ID</th>
                        <th>Fee Category Name</th>
                    </tr>
                </thead>
                <tbody id="TB_FeeCategories">
                    <!-- Populated by finance-fee-category.js -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal for New/Modify Fee Category -->
<div id="MODAL_FeeCategory" class="coa-modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10005; align-items: center; justify-content: center;">
    <div class="coa-modal" style="width: 480px; background: #f0f0f0; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); overflow: hidden; border: 1px solid #888;">
        <!-- Modal Header -->
        <div class="coa-modal-header" id="MFC_CatHeader" style="background: #2e3192; color: white; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: move; user-select: none;">
            <div id="MFC_CatTitle" style="font-size: 14px;">New Fees Category</div>
            <div style="font-size: 22px; color: #fff; opacity: 0.8; cursor: pointer; padding: 0 5px;" onclick="FeeCategoryManager.closeModal()" onmousedown="event.stopPropagation()">&times;</div>
        </div>
        <!-- Modal Body -->
        <div class="coa-modal-body" style="padding: 25px; background: #fff;">
            <form id="MFC_CatForm" onsubmit="event.preventDefault();" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="form-row-setup">
                    <label style="width: 120px; font-size: 13px; font-weight: bold; color: #333;">Category Name:</label>
                    <input type="text" id="MFC_CatName" class="wd-input-setup" placeholder="Enter category name..." style="padding: 5px 8px; border: 1px solid #aaa; border-radius: 1px; font-size: 12px;">
                </div>
            </form>
        </div>
        <!-- Modal Footer -->
        <div class="coa-modal-footer" style="padding: 12px; background: #f5f5f5; border-top: 1px solid #ddd; text-align: right; display: flex; justify-content: center; gap: 15px;">
            <button class="wd-btn primary" style="padding: 10px 40px; min-width: 120px;" onclick="FeeCategoryManager.handleSave()">
                Validate <i class="fa-solid fa-circle-check"></i>
            </button>
            <button class="wd-btn danger" style="padding: 10px 40px; min-width: 120px;" onclick="FeeCategoryManager.closeModal()">
                Cancel <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>
</div>

<style>
    .category-container {
        height: calc(100% - 75px);
        border: 1px solid #ccc;
        background: #fff;
        display: flex;
        flex-direction: column;
        font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    
    .category-content-row {
        flex: 1;
        overflow: hidden;
        border-top: 2px solid #2e3192;
    }
    
    .category-table-wrapper {
        height: 100%;
        overflow: auto;
    }
    
    .category-table {
        width: 100%;
        border-collapse: collapse;
    }
    
    .category-table thead th {
        background: #2e3192;
        color: #fff;
        padding: 10px;
        text-align: left;
        position: sticky;
        top: 0;
        z-index: 10;
        border-right: 1px solid #1f226f;
        font-size: 13px;
        font-weight: 600;
    }
    
    .category-table tbody td {
        padding: 6px 8px;
        border-bottom: 1px solid #b4c7e7;
        border-right: 1px solid #b4c7e7;
        font-size: 13px;
        color: #000;
        height: 32px;
        vertical-align: middle;
    }
    
    .category-table tr:nth-child(even) {
        background-color: #f2f7ff;
    }
    
    .category-table tr.selected td {
        background-color: #cd2027 !important;
        color: #fff !important;
    }
    
    .category-table tr:hover:not(.selected) td {
        background-color: #e6f1ff;
    }
    
    .form-row-setup {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .form-row-setup label {
        width: 120px;
        font-size: 12px;
        color: #333;
    }
    .wd-input-setup {
        flex: 1;
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 2px;
        font-size: 12px;
    }
    .wd-btn {
        border-radius: 4px;
        cursor: pointer;
        transition: 0.2s;
        border: 1px solid #ccc;
        background: #fff;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
    }
    .wd-btn.primary {
        background: #2e3192 !important;
        color: #fff !important;
        border-color: #2e3192 !important;
        font-weight: bold;
    }
    .wd-btn.danger {
        background: #cd2027 !important;
        color: #fff !important;
        border-color: #cd2027 !important;
        font-weight: bold;
    }
</style>
