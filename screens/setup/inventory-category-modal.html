<!-- MODAL for New/Modify Main & Sub Category -->
<div id="MODAL_InvGeneric" class="coa-modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10006; align-items: center; justify-content: center;">
    <div class="coa-modal" style="width: 450px; max-width: 95%; background: #f0f0f0; border-radius: 6px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column;">
        <div class="coa-modal-header" id="MIG_Header" style="background: #2e3192; color: white; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: move; border-radius: 6px 6px 0 0;">
            <div id="MIG_Title">New Category</div>
            <div style="font-size: 22px; color: #fff; opacity: 0.8; cursor: pointer;" onclick="InventoryModalManager.closeModal()">&times;</div>
        </div>
        <div class="coa-modal-body" style="padding: 20px; background: #fff;">
            <form id="MIG_Form" onsubmit="event.preventDefault();">
                <div class="form-group" id="MIG_ParentGroup" style="display: none; margin-bottom: 15px;">
                    <label style="font-weight:bold; display:block; margin-bottom:8px;">Select Main Category</label>
                    <select id="MIG_ParentSelect" class="wd-input" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></select>
                </div>
                <div class="form-group">
                    <label id="MIG_Label" style="font-weight:bold; display:block; margin-bottom:8px;">Category Name</label>
                    <input type="text" id="MIG_InputName" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;" required>
                </div>
            </form>
        </div>
        <div class="coa-modal-footer" style="padding: 12px 20px; background: #f0f0f0; border-top: 1px solid #ddd; text-align: right; display: flex; justify-content: flex-end; gap: 10px; border-radius: 0 0 6px 6px;">
            <button class="wd-action-btn primary" id="MIG_SaveBtn" onclick="InventoryModalManager.handleSave()">
                <i class="fa-solid fa-plus"></i> Create
            </button>
            <button class="wd-action-btn danger" onclick="InventoryModalManager.closeModal()">
                <i class="fa-solid fa-xmark"></i> Close
            </button>
        </div>
    </div>
</div>
