<!-- screens/setup/setup-requisition.html -->
<div class="page-header">
    <h2 style="color: #2e3192; text-align: center;">Requisition Form Setup</h2>
</div>

<div class="req-container">
    <!-- Main Template Window (Based on Print Requisition Form.jpg) -->
    <div class="coa-modal" style="width: 900px; max-width: 95%; background: #fff; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); overflow: hidden; border: 1px solid #888; margin: 10px auto; display: flex; flex-direction: column;">
        <div class="coa-modal-header" style="background: #2e3192; color: white; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: move;">
            <div style="font-size: 16px;">Requisition Template</div>
            <div style="font-size: 22px; color: #fff; opacity: 0.8; cursor: pointer;" onclick="loadScreen('home.html')">&times;</div>
        </div>

        <div class="req-body" style="padding: 15px; flex: 1; display: flex; flex-direction: column;">
            <div style="text-align: center; font-size: 26px; color: #2e3192; font-weight: 300; margin-bottom: 5px;">New Requisition Form</div>
            <div style="height: 1px; background: #cd2027; width: 60%; margin: 0 auto 15px auto;"></div>

            <div style="text-align: center; color: #cd2027; font-size: 14px; margin-bottom: 15px;">
                Use the "delete" and "add" buttons to adjust the size of the print-out requisition form
            </div>

            <div style="display: flex; gap: 15px; flex: 1;">
                <!-- Table Section -->
                <div style="flex: 1; overflow: auto; border: 1px solid #ccc; background: #fff;">
                    <table class="wd-table req-table">
                        <thead>
                            <tr>
                                <th style="width: 50px;">SN</th>
                                <th>DESCRIPTION</th>
                                <th style="width: 80px; text-align: center;">QTY</th>
                                <th style="width: 120px; text-align: right;">UNIT PRICE</th>
                                <th style="width: 150px; text-align: right;">TOTAL COST</th>
                                <th style="width: 90px;"></th>
                            </tr>
                        </thead>
                        <tbody id="TB_RequisitionLines">
                            <!-- Populated by setup-requisition.js -->
                        </tbody>
                    </table>
                </div>

                <!-- Sidebar Actions -->
                <div style="width: 150px; display: flex; flex-direction: column; gap: 15px;">
                    <div class="form-group">
                        <label style="font-size: 11px; font-weight: bold;">Batch/Year:</label>
                        <select id="REQ_AcademicYear" class="wd-input" style="width: 100%; font-size: 11px;"></select>
                    </div>
                    
                    <button class="wd-btn primary" style="width: 100%; padding: 10px;" onclick="window.printRequisitionForm()">
                        Print Form <i class="fa-solid fa-print" style="font-size: 18px; margin-left: 10px;"></i>
                    </button>

                    <div style="margin-top: auto; display: flex; justify-content: flex-start;">
                        <button class="wd-btn primary" style="font-size: 24px; padding: 0 15px; font-weight: bold;" onclick="window.addRequisitionRow()">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Form Metadata Section (Hidden, used for Print Generation) -->
    <div id="REQ_Metadata_Store" style="display: none;">
        <input type="text" id="PR_ReqNo" value="NEW">
        <input type="text" id="PR_MainHead" value="">
        <input type="text" id="PR_MainCode" value="">
        <input type="text" id="PR_SubHead" value="">
        <input type="text" id="PR_SubCode" value="">
        <input type="text" id="PR_Dept" value="ADMINISTRATION">
        <input type="date" id="PR_Date">
        <input type="text" id="PR_DeliverTo" value="">
    </div>
</div>

<style>
    .req-container { height: calc(100% - 60px); background: #dcdcdc; padding: 10px; overflow: auto; }
    
    .req-table { width: 100%; border-collapse: collapse; }
    .req-table thead th { background: #2e3192; color: #fff; padding: 10px; font-size: 13px; text-align: left; position: sticky; top: 0; z-index: 10; }
    .req-table tbody td { padding: 0; border-bottom: 1px solid #ccc; border-right: 1px solid #ccc; background: #fff; height: 35px; }
    
    .req-input { width: 100%; height: 100%; border: none; padding: 0 8px; font-size: 13px; outline: none; background: transparent; color: inherit; }
    .req-input:focus { background: #f0f8ff; }
    .req-input.text-right { text-align: right; }
    .req-input.text-center { text-align: center; }
    
    .req-table tr:hover td { background-color: #f9f9f9; }

    .wd-btn { border: 1px solid #ccc; border-radius: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .wd-btn:hover { opacity: 0.9; }
    .wd-btn.primary { background: #2e3192 !important; color: #fff !important; font-weight: bold; border-color: #2e3192; }
    .wd-btn.danger { background: #cd2027 !important; color: #fff !important; font-weight: bold; border-color: #cd2027; }
    
    .wd-input { padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }

    /* Scrollbar */
    .req-container::-webkit-scrollbar { width: 8px; height: 8px; }
    .req-container::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
</style>
