<div class="create-bills-screen student-write-off-wrapper">
    <!-- TOP SECTION -->
    <div class="cb-top-panel">
        <div class="page-header-wrapper" style="justify-content: space-between; padding: 5px 15px;">
             <div style="display: flex; align-items: center; gap: 8px;">
                <label style="font-weight: bold; color: #2e3192;">Batch/Year:</label>
                <select id="SWO_BatchYear" class="wd-input" style="width: 150px;">
                    <option>Academic Year 2025</option>
                </select>
            </div>
            <div class="page-header" style="flex: 1; text-align: center;">
                <h2 class="page-title">WRITE OFF STUDENT DEBTS</h2>
            </div>
            <div style="width: 150px;"></div> <!-- Spacer for centering -->
        </div>

        <div class="page-toolbar" style="display: flex; justify-content: space-between; padding: 5px 15px; background: none; border: none;">
            <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
                <label style="font-weight: bold;">Received From:</label>
                <input type="text" id="SWO_ReceivedFrom" class="wd-input" placeholder="Click to search student..." style="width: 350px; cursor: pointer; background: #fff url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'16\' height=\'16\' viewBox=\'0 0 16 16\'><path fill=\'%23ccc\' d=\'M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z\'/></svg>') no-repeat right 10px center;" readonly>
                <input type="hidden" id="SWO_StudentId">
            </div>
        </div>

        <div class="form-body" style="padding: 10px 15px; gap: 20px;">
            <div class="form-main" style="flex: 1.5;">
                <div class="amount-section">
                    <label for="SWO_AmountInput">Amount</label>
                    <div class="amount-editable">
                        <input type="text" id="SWO_AmountInput" class="amount-input" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="0" />
                    </div>
                    <div class="amount-words" id="SWO_AmountWords">Amount in words</div>
                </div>
            </div>

            <div>
                <div style="display: flex; align-items: start;">
                    <table id="" class="wd-table">
                        <thead>
                        <tr>
                            <th>Bad Debt Account</th>
                            <th>Reference #</th>
                            <th>Operation Date</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td style="padding: 0%; max-width: 100%">
                            <select style="width: 100%; height: 100%; outline: none" aria-readonly="true">
                                <option aria-readonly="true">605620-Bad Debt Expense</option>
                            </select>
                            </td>
                            <td style="padding: 0%; max-width: 100%">
                            <input
                                type="text"
                                placeholder="(S/036)"
                                style="width: 100%; height: 100%; outline: none"
                                readonly
                            />
                            </td>
                            <td style="padding: 0%; max-width: 100%">
                            <input
                                type="date"
                                style="width: 100%; height: 100%; outline: none"
                                id="SWO_Date"
                            />
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            <div style="display: flex; gap: 10px; align-items: start;">
                <div class="form-side" style="padding: 1%">
                    <label style="font-weight: bold">Current Balance:</label>
                    <input
                    id="SWO_BalanceDisplay"
                    type="text"
                    class="amount-input"
                    placeholder="0 Frs"
                    style="width: 120px; font-weight: bold; text-align: left"
                    readonly
                    />
                </div>
                <div class="form-group" style="float: right">
                    <label style="font-weight: bold">Students Account Receivables:</label>
                    <input
                    type="text"
                    id="SWO_AccountReceivable"
                    placeholder="411110-School Fees Receivable"
                    style="width: 180px"
                    readonly
                    style="border-style: none; outline: none"
                    />
                </div>
            </div>
        </div>
    </div>

    <!-- MIDDLE SECTION (Table) -->
    <div class="cb-middle-panel" style="padding: 0 15px;">
        <table id="TABLE_StudentWriteOff" class="wd-table blue-header">
            <colgroup>
                <col style="width: 30px;">
                <col style="width: 40px;">
                <col style="width: 120px;">
                <col style="width: 120px;">
                <col>
                <col style="width: 120px;">
                <col style="width: 120px;">
                <col style="width: 120px;">
                <col style="width: 60px;">
            </colgroup>
            <thead>
                <tr>
                    <th><input type="checkbox" id="SWO_CheckAll"></th>
                    <th>No</th>
                    <th>Due Date</th>
                    <th>Amt.Paid</th>
                    <th>Description</th>
                    <th>Orig. Amt</th>
                    <th>Amt.Left</th>
                    <th>Bad Debt Amount</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <!-- Rows injected by JS -->
            </tbody>
            <tfoot>
                <tr style="background: #f0f0f0; font-weight: bold;">
                    <td colspan="3" style="text-align: left;">Total</td>
                    <td class="amount" id="SWO_TotalPaid">0 Fcfa</td>
                    <td></td>
                    <td class="amount" id="SWO_TotalOrig">0 Fcfa</td>
                    <td class="amount" id="SWO_TotalLeft">0 Fcfa</td>
                    <td class="amount" id="SWO_TotalBadDebt">0 Fcfa</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>

    <!-- BOTTOM SECTION -->
    <div class="cb-bottom-panel">
        <div style="display: flex; gap: 30px; align-items: flex-start;">
            <div style="flex: 1;">
                <label style="font-weight: bold; color: #cd2027;">Description:</label>
                <textarea id="SWO_Description" class="wd-input" style="height: 60px; margin-top: 5px;" placeholder="Bad Debt Written OFF..."></textarea>
            </div>
            <div class="side-summary" style="width: 300px; background: #fff; border: 1px solid #ccc; padding: 10px; border-radius: 4px;">
                <div style="display: flex; justify-content: space-between; padding: 4px 0;">
                    <span style="font-weight: bold; color: #555;">Amount Paid:</span>
                    <span id="SWO_SummaryPaid" style="font-weight: bold; color: #2e3192;">0 Frs</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 4px 0; border-top: 1px solid #eee;">
                    <span style="font-weight: bold; color: #555;">Bad Debt to apply:</span>
                    <span id="SWO_SummaryApply" style="font-weight: bold; color: #2e3192; font-size: 20px;">0 Frs</span>
                </div>
            </div>
        </div>

        <div class="form-actions" style="margin-top: 10px; justify-content: flex-end;">
            <button class="btn-primary" id="BTN_SWO_Validate">Validate Only <i class="fa-solid fa-check-circle"></i></button>
            <button class="btn-secondary" style="border: 1px solid #cd2027; color: #cd2027; background: #fff;" id="BTN_SWO_Cancel">Cancel <i class="fa-solid fa-times"></i></button>
        </div>
    </div>

    <!-- Student Picker Modal Overlay -->
    <div id="MODAL_StudentPicker" class="po-modal-overlay" style="display: none;">
        <div class="po-modal" style="width: 850px; height: 550px;">
            <div class="po-modal-header" id="MODAL_StudentPicker_Header">
                <span>Select Student</span>
                <span class="po-modal-close" onclick="window.closeStudentPicker()">&times;</span>
            </div>
            <div class="po-modal-body" style="padding: 10px; flex: 1; display: flex; flex-direction: column;">
                <div style="margin-bottom: 10px;">
                    <input type="text" id="SWO_SearchStudent" class="wd-input" placeholder="Search by name or enrollment no..." style="width: 100%; padding: 10px;">
                </div>
                <div class="table-scroll-wrapper" style="flex: 1; border: 1px solid #ccc;">
                    <table class="wd-table blue-header" id="TABLE_StudentPicker">
                        <thead>
                            <tr>
                                <th>Enrollment No</th>
                                <th>Full Name</th>
                                <th>Specialty/Program</th>
                                <th style="width: 120px;">Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
<style>
    /* Main Screen Container - Flex Column Layout */
    .create-bills-screen {
        display: flex;
        flex-direction: column;
        height: 100%;
        overflow: hidden; /* Prevent outer scroll */
        font-family: Tahoma, Arial, sans-serif;
        font-size: 14px; /* Restored font size */
    }

    /* Top Section: Header, Toolbar, Form */
    .cb-top-panel {
        flex: 0 0 auto; /* Height determined by content */
        padding-bottom: 5px;
        background: #fff;
        /*border-bottom: 1px solid #e0e0e0;*/
    }

    /* Middle Section: Table (Scrollable) */
    .cb-middle-panel {
        flex: 1; /* Takes remaining height */
        overflow-y: auto;
        position: relative;
        min-height: 100px;
    }

    /* Bottom Section: Totals, Summary, Actions (Sticky Bottom) */
    .cb-bottom-panel {
        flex: 0 0 auto;
        background: #f8f8f8;
        border-top: 1px solid #ccc;
        padding: 5px 10px;
        z-index: 10;
    }

    /* Sticky Table Header inside the scrolling middle panel */
    #TABLE_StudentDebts thead th {
        position: sticky;
        top: 0;
        z-index: 5;
        background: #2e3192; /* Ensure background for sticky header */
        color: #fff;
        padding: 8px 4px;
        font-weight: bold;
        border: 1px solid #1a1d63;
        font-size: 13px;
    }

    /* Common styles from create-service-bills.html and other files */
    .page-header-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
    }

    .page-header {
        text-align: center;
    }

    .page-title {
        margin: 0;
        color: #2e3192;
        font-size: 20px;
        font-weight: bold;
    }

    .page-toolbar {
        padding: 8px 10px;
        background: #f0f0f0;
        border-bottom: 1px solid #ddd;
    }

    .wd-input {
        padding: 6px;
        border: 1px solid #999;
        font-size: 12px;
        border-radius: 4px;
        box-sizing: border-box;
    }

    .wd-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
    }

    .wd-table th, .wd-table td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: left;
    }

    .wd-table tbody tr:nth-child(even) {
        background-color: #f9f9f9;
    }

    .wd-btn {
        padding: 6px 12px;
        border: 1px solid #999;
        background: #f0f0f0;
        cursor: pointer;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        justify-content: center;
        border-radius: 4px;
    }

    .wd-btn.reject {
        border-color: #cd2027;
        background-color: #cd2027;
        color: #fff;
        font-weight: bold;
    }

    .form-body {
        display: flex;
        gap: 20px;
        padding: 0 10px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
    }

    textarea {
        width: 20%;
        padding: 8px;
        border: 1px solid #999;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 12px;
        resize: vertical;
    }

    .form-actions {
        display: flex;
        gap: 10px;
    }

    .btn-primary {
        background-color: #2e3192;
        color: #fff;
        border: 1px solid #1a1d63;
        padding: 8px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }

    .btn-secondary {
        background-color: #f0f0f0;
        color: #333;
        border: 1px solid #999;
        padding: 8px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }

    .btn-primary:hover, .btn-secondary:hover {
        opacity: 0.9;
    }

    /* Specific adjustments for this screen */
    .page-toolbar label {
        min-width: 80px; /* Adjust label width for alignment */
        text-align: right;
    }

    .side-summary > div {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .order-date-input {
        width: 100%;
        padding: 6px;
        border: 1px solid #e0e0e0;
        border-top: none;
    }

    /* Responsive adjustments */
    @media (max-width: 1024px) {
        .form-body {
            flex-direction: column;
        }
        .form-side {
            max-width: 100%;
        }
        .page-toolbar {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }
        .page-toolbar > div {
            width: 100%;
            justify-content: space-between;
        }
    }

    @media (max-width: 768px) {
        .cb-top-panel, .cb-middle-panel, .cb-bottom-panel {
            padding: 5px;
        }
        .page-title {
            font-size: 18px;
        }
        .amount-input {
            font-size: 20px;
        }
        .fcfa-label {
            font-size: 16px;
        }
        .amount-words {
            font-size: 12px;
        }
        .wd-table th, .wd-table td {
            padding: 5px;
            font-size: 11px;
        }
        .cb-bottom-panel > div {
            flex-direction: column;
            gap: 15px;
        }
        .form-actions {
            width: 100%;
            justify-content: center;
        }
        .btn-primary, .btn-secondary {
            flex: 1;
        }
    }
</style>

</div>
