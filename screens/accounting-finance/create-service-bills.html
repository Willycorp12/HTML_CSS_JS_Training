<!-- ================= PAGE HEADER ================= -->

<style>
  /* Main Screen Container - Flex Column Layout */
  .create-bills-screen {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden; /* Prevent outer scroll */
    font-family: Tahoma, Arial, sans-serif;
    font-size: 14px; /* Restored font size */
  }

  /* Top Section: Header, Toolbar, Form */
  .cb-top-panel {
    flex: 0 0 auto; /* Height determined by content */
    padding-bottom: 5px;
    background: #fff;
    /*border-bottom: 1px solid #e0e0e0;*/
  }

  /* Middle Section: Table (Scrollable) */
  .cb-middle-panel {
    flex: 1; /* Takes remaining height */
    overflow-y: auto;
    position: relative;
    min-height: 100px;
  }

  /* Bottom Section: Totals, Summary, Actions (Sticky Bottom) */
  .cb-bottom-panel {
    flex: 0 0 auto;
    background: #f8f8f8;
    border-top: 1px solid #ccc;
    padding: 5px 10px;
    z-index: 10;
  }

  /* Sticky Table Header inside the scrolling middle panel */
  #TABLE_ServiceBills thead th {
    position: sticky;
    top: 0;
    z-index: 5;
    /* Background inherited from windev-table.css */
  }

  /* Compact adjustments */
  .form-body {
    margin-bottom: 5px !important;
    gap: 15px !important;
  }

  /* Summary Section Text Size Increase */
  .side-summary .net-amount, 
  .side-summary .dynamical {
    font-size: 16px;
  }
  
  .amount-input {
    font-size: 14px !important;
  }

  #SELECT_Supplier {
    font-size: 14px;
  }
</style>

<div class="create-bills-screen">

<!-- ================= TOP SECTION ================= -->
<div class="cb-top-panel">
  <div class="page-header-wrapper">
  <div class="page-header"><h2 class="page-title">CREATE BILLS</h2></div>
  </div>

<!-- ================= SUPPLIER TOOLBAR ================= -->
<div
  class="page-toolbar"
  style="
    margin-bottom: 2px;
    display: flex;
    justify-content: space-between;
    align-items: start;
  "
>
  <div style="display: flex; justify-content: center">
    <label style="font-weight: bold">Supplier:</label>
    <select id="SELECT_Supplier" style="margin-left: 8px; min-width: 180px">
      <!-- Options will be populated by JS -->
    </select>
    <button class="wd-btn" style="margin-left: 4px" id="btnOpen" onclick="openServiceBillSupplierModal()">+</button>
  </div>
  <div class="order-date-box">
    <div class="order-date-title">Order Date</div>
    <input type="date" class="order-date-input" id="billorderdate"/>
  </div>
</div>

<!-- ================= SUPPLIER & BILL INFO ================= -->
<div class="form-body">
  <!-- TO SECTION -->
  <div style="width: 35%">
    <div
      class="wd-table-header"
      style="
        background: #2e3192;
        color: #fff;
        padding: 6px 12px;
        font-weight: bold;
        border-radius: 4px 4px 0 0;
      "
    >
      TO
    </div>
    <div
      style="
        border: 1px solid #e0e0e0;
        border-top: none;
        padding: 8px;
        border-radius: 0 0 4px 4px;
      "
    >
      <div
        id="SUPPLIER_Name"
        style="font-weight: bold; font-size: 14px; text-transform: uppercase"
      >
        not set
      </div>
      <div id="SUPPLIER_Address">not set</div>
      <div id="SUPPLIER_Email">not set</div>
      <div id="SUPPLIER_Phone">not set</div>
    </div>
  </div>

  <!-- BILL DETAILS -->
  <div>
    <div style="display: flex; align-items: end">
      <table id="payment" class="wd-table">
        <thead>
          <tr>
            <th>Payment Method</th>
            <th>Bill #</th>
            <th>Due Date</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style="padding: 0%; max-width: 100%">
              <select style="width: 100%; height: 100%; outline: none" aria-readonly="true">
                <option aria-readonly="true">All on credit</option>
              </select>
            </td>
            <td style="padding: 0%; max-width: 100%">
              <input
                type="text"
                placeholder="0002"
                style="width: 100%; height: 100%; outline: none"
                readonly
              />
            </td>
            <td style="padding: 0%; max-width: 100%">
              <input
                type="date"
                style="width: 100%; height: 100%; outline: none"
                id="billduedate"
              />
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div style="display: flex; gap: 10px; align-items: center">
      <div class="form-side" style="padding: 1%">
        <label style="font-weight: bold">Account Balance:</label><br />
        <input
          id="SUPPLIER_Balance"
          type="text"
          class="amount-input"
          placeholder="0 Frs"
          style="width: 150px; font-weight: bold; text-align: left"
          readonly
        />
      </div>
      <div class="form-group" style="float: right">
        <label style="font-weight: bold">Accounts Payable (A/P)</label>
        <input
          type="text"
          id="SUPPLIER_Account"
          placeholder="401100-Service Suppliers"
          style="width: 180px"
          readonly
          style="border-style: none; outline: none"
        />
      </div>
    </div>
  </div>
</div>
<input
  type="text"
  id="EDT_GlobalSearch"
  class="global-search"
  placeholder="Search by Account name to add to bill..."
/>
</div>
<div id="account-search-results" class="search-results-container"></div>

<!-- ================= MIDDLE SECTION (Table) ================= -->
<div class="cb-middle-panel service-bill-table-wrap">
  <table
    id="TABLE_ServiceBills"
    class="wd-table"
    style="margin-top: 0; width: 100%; table-layout: fixed;"
  >
    <colgroup>
      <col style="width: 4%" />
      <col style="width: 12%" />
      <col style="width: 64%" />
      <col style="width: 10%" />
      <col style="width: 10%" />
    </colgroup>
    <thead>
      <tr>
        <th>No</th>
        <th>Account Name</th>
        <th>Description</th>
        <th>Amount</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- ================= BOTTOM SECTION ================= -->
<div class="cb-bottom-panel">

<!-- Total Row Table -->
<table class="wd-table" style="width: 100%; table-layout: fixed; margin-top: 0">
  <colgroup>
    <col style="width: 2%" />
    <col style="width: 16%" />
    <col style="width: 64%" />
    <col style="width: 10%" />
    <col style="width: 8%" />
  </colgroup>
  <tbody>
    <tr style="background: #f0f0f0; font-weight: bold">
      <td colspan="3" style="text-align: right">TOTAL</td>
      <td class="amount" id="CELL_ServiceBill_Total">0</td>
      <td></td>
    </tr>
  </tbody>
</table>

<!-- ===== COMMENTS & AMOUNT IN WORDS ===== -->
<div style="display: flex; gap: 24px; margin-top: 0px; align-items: flex-start">
  <div class="form-group">
    <label style="font-weight: bold; color: #cd2027; margin-bottom: 0px"
      >Comments/Special Instruction</label
    >
    <textarea id="bill_description" placeholder="Comments" style="margin-top: 0px"></textarea>
  </div>
  <div style="flex: 1.5">
    <label style="font-weight: bold">Amount in Words:</label>
    <span id="amount-words" style="font-size: 16px; color: #2e3192"></span>
  </div>
  <div class="side-summary" style="margin-top: 1px;">
    <div style="margin-bottom: 0%;">
      Deduct AIT<input id="inc-ait" type="checkbox" style="margin-left: 4px" />
    </div>
    <br />
    <div style="margin-bottom: 0%;" class="net-amount">Bill:</div>
    <div style="margin-bottom: 0%;" class="dynamical" id="bill">0 FCFA</div>
    <br />
    <div style="margin-bottom: 0%;" class="net-amount">AIT (5.5%):</div>
    &nbsp;
    <div style="margin-bottom: 0%;" class="dynamical" id="ait">0 FCFA</div>
    <br />
    <div style="margin-bottom: 0%;" class="net-amount">Net:</div>
    <div style="margin-bottom: 0%;" class="dynamical" id="net">0 FCFA</div>
    <br />
  </div>
</div>

<!-- ===== SUMMARY PANEL ===== -->
<div
  style="
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 32px;
  "
>
  <div class="form-actions" style="margin-top: 0%; padding-top: 2px">
    <button class="btn-primary" id="BTN_SaveBill">Forward for Approval</button>
    <button class="btn-secondary" onclick="loadScreen('home.html', this)">Close</button>
  </div>
</div>
</div> <!-- End Bottom Panel -->

</div> <!-- End Screen Container -->

<!-- ================= SUPPLIER MODAL (Embedded) ================= -->
<div id="MODAL_ServiceBillSupplier" class="coa-modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10001; align-items: center; justify-content: center;">
    <div class="coa-modal" style="width: 800px; background: #f0f0f0; border-radius: 6px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column;">
        <div class="coa-modal-header" style="background: #2e3192; color: white; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: move;">
            <div class="coa-modal-title" id="MODAL_SB_Title">New Supplier</div>
            <div class="coa-modal-close" onclick="closeServiceBillSupplierModal()" style="font-size: 22px; color: #fff; opacity: 0.8; cursor: pointer;">&times;</div>
        </div>
        <div class="coa-modal-body" style="padding: 15px; background: #fff;">
            <div style="display: flex; gap: 18px;">
                <!-- Left Column -->
                <div style="flex: 1; display: flex; flex-direction: column; gap: 9px;">
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" id="SB_INP_CompanyName" required style="width: 100%;">
                    </div>
                    <fieldset style="border: 1px solid #ccc; padding: 10px; border-radius: 4px;">
                        <legend>Vendor Number</legend>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <i class="fa-solid fa-barcode" style="font-size: 24px; color: #555;"></i>
                            <input type="text" id="SB_INP_VendorNumber" style="flex-grow: 1; border: none; outline: none; font-family: inherit;">
                        </div>
                    </fieldset>
                    <div class="form-group"><label>Phone Number</label><input type="text" id="SB_INP_Phone" style="width: 100%;"></div>
                    <div class="form-group"><label>Website</label><input type="text" id="SB_INP_Website" style="width: 100%;"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="SB_INP_Email" style="width: 100%;"></div>
                    <div class="form-group"><label>Date</label><input type="date" id="SB_INP_Date" style="width: auto;"></div>
                </div>
                <!-- Right Column -->
                <div style="flex: 1; display: flex; flex-direction: column; gap: 6px;">
                    <div class="form-group"><label>Contact Person</label><input type="text" id="SB_INP_ContactPerson" style="width: 100%;"></div>
                    <div class="form-group"><label>Address 1</label><input type="text" id="SB_INP_Address" style="width: 100%;"></div>
                    <div class="form-group"><label>Address 2</label><input type="text" id="SB_INP_Address2" style="width: 100%;"></div>
                    <div class="form-group"><label>Town</label><input type="text" id="SB_INP_City" style="width: 100%;"></div>
                    <div class="form-group"><label>Country</label><input type="text" id="SB_INP_Country" style="width: 100%;"></div>
                    <div class="form-group"><label>Supplier Type</label><select id="SB_INP_Type" style="width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #cfd3dd; border-radius: 6px; box-sizing: border-box;">
                        <option value=1>Inventory Supplier</option>
                        <option value=2>Fixed Asset Supplier</option>
                        <option value=3>Other Supplier Type</option>
                    </select>
                    </div>
                    <div class="form-group">
                        <label>Account Name</label>
                        <input type="text" id="SB_INP_AccountName" placeholder="Click to select account" readonly style="cursor: pointer; background: #fff; width: 100%;">
                        <input type="hidden" id="SB_INP_ChartOfAccountsId">
                    </div>
                </div>
            </div>
            <form id="FORM_SB_Supplier" style="display: none;">
                <input type="hidden" id="SB_INP_SupplierID">
            </form>
        </div>
        <div class="coa-modal-footer" style="padding: 12px 20px; background: #f0f0f0; border-top: 1px solid #ddd; text-align: right;">
            <button class="wd-action-btn primary" id="BTN_SB_SaveSupplier">Validate</button>
            <button class="wd-action-btn danger" onclick="closeServiceBillSupplierModal()">Close</button>
        </div>
    </div>
</div>
