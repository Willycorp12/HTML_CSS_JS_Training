<!-- screens/approved-supplier-bills.html -->
<div class="approved-bills-screen report-screen-wrapper" style="display: flex; flex-direction: column; height: 100%; background: #fff;">
    <div class="page-header" style="text-align: center; padding: 10px; border-bottom: 1px solid #ddd;">
        <h2 style="margin: 0; color: #2e3192; font-size: 18px; text-transform: uppercase;">Approved Supplier Bills</h2>
    </div>

    <!-- Filters Section -->
    <div class="cj-filter-bar" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background: #f9f9f9; border-bottom: 1px solid #ddd;">
        <div class="search-box" style="flex: 1; max-width: 350px;">
            <input type="text" id="EDT_FilterMotive" class="global-search" placeholder="Filter by Motive..." 
                   style="width: 100%; padding: 5px 10px; border: 1px solid #ccc; border-radius: 0;">
        </div>
        
        <div class="date-filters" style="display: flex; align-items: center; gap: 8px; font-size: 12px;">
            <label>From:</label>
            <input type="date" id="DATE_ApprovedFrom" style="padding: 3px; border: 1px solid #ccc;">
            <label>To:</label>
            <input type="date" id="DATE_ApprovedTo" style="padding: 3px; border: 1px solid #ccc;">
            <button id="BTN_RefreshApproved" class="wd-btn pay" style="padding: 4px 12px; height: 28px;">Refresh</button>
        </div>
    </div>

    <!-- Table Section -->
    <div class="table-scroll-wrapper" style="flex: 1; overflow: auto;">
        <table id="TABLE_ApprovedSupplierBills" class="wd-table report-table" style="width: 100%; border-collapse: collapse; table-layout: fixed;">
            <colgroup>
                <col style="width: 40px">
                <col style="width: 90px">
                <col style="width: 110px">
                <col>
                <col style="width: 150px">
                <col style="width: 90px">
                <col style="width: 90px">
                <col style="width: 90px">
                <col style="width: 110px">
                <col style="width: 240px">
            </colgroup>
            <thead>
                <tr style="background: #2e3192; color: white;">
                    <th>SN</th>
                    <th>Date</th>
                    <th>Reference</th>
                    <th>Description</th>
                    <th>Beneficiary</th>
                    <th class="text-right amount">Initial Amt</th>
                    <th class="text-right amount">Amt Paid</th>
                    <th class="text-right amount">Amt Left</th>
                    <th>Generated by</th>
                    <th>Take actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dynamic content injected here -->
            </tbody>
        </table>
    </div>

    <!-- Total Bar (Sticky Bottom style) -->
    <div class="report-footer" style="background: #fff; border-top: 2px solid #2e3192; display: flex; overflow: hidden;">
        <table class="wd-table report-table" style="width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 0;">
            <colgroup>
                <col style="width: 40px">
                <col style="width: 90px">
                <col style="width: 110px">
                <col>
                <col style="width: 150px">
                <col style="width: 90px">
                <col style="width: 90px">
                <col style="width: 90px">
                <col style="width: 110px">
                <col style="width: 240px">
            </colgroup>
            <tfoot>
                <tr class="font-bold">
                    <td colspan="5" style="text-align: left; padding: 8px;  font-weight: bold; font-size: 16px;">TOTAL</td>
                    <td colspan="5" class="text-right" id="CELL_ApprovedTotal"  style="color: #2e3192; font-weight: bold; font-size: 16px;">0</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<style>
    .approved-bills-screen .wd-btn { padding: 3px 10px; font-size: 11px; margin-right: 4px; border: 1px solid transparent; }
    .btn-act-modify { background: #2e3192; color: #fff; }
    .btn-act-view { background: #008300; color: #fff; }
    .btn-act-payments { background: #ff8c00; color: #fff; }
    .text-right { text-align: right !important; }
</style>
