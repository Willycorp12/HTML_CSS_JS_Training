<!-- ================= PAGE HEADER ================= -->
<style>
/* ===== HEADER ===== */

.order-date-input {
  width: 100%;
  padding: 6px;
  border: 1px solid #e0e0e0;
  border-top: none;
}

/* ===== LAYOUT ===== */
.form-body {
  display: flex;
  justify-content: flex-start;
  gap: 20px;
}

/* Editable Cells (ContentEditable) */
.wd-table td[contenteditable="true"] {
    background-color: #fcfcfc; /* Subtle indication it is editable */
    cursor: text;
    transition: background-color 0.2s, outline 0.2s;
}

.wd-table td[contenteditable="true"]:focus {
    background-color: #fff;
    outline: 2px solid #2e3192; /* WinDev Blue highlight */
    z-index: 1;
    position: relative;
}

/* Search results dropdown */
.search-results-container {
    position: relative;
}
#account-search-results {
    position: absolute;
    background: #fff;
    border-top: none;
    width: 300px; /* Same as global-search */
    max-height: 250px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
.search-result-item {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
}
.search-result-item:hover {
    background: #f0f0f0;
}
.search-result-item .code {
    color: #888;
    margin-right: 8px;
}
</style>

<div class="page-header-wrapper">
  <div class="page-header"><h2 class="page-title">JOURNAL ENTRIES</h2></div>
</div>

<!-- ================= SUPPLIER & BILL INFO ================= -->
<div class="form-body">
<input type="date" class="order-date-input" style="width:150px; margin-right:0px;" />
<input
            type="text"
            id="EDT_GlobalSearch"
            class="global-search"
            placeholder="Search by Account name to add to bill..."
            style="margin-left: 0%;"
        />
<div id="account-search-results" class="search-results-container"></div>    
</div>
<!-- ================= TABLE ================= -->
 <div class="table-scroll-wrapper service-bill-table-wrap">

    <col style="width:20%">
    <col style="width:30%">
    <col style="width:20%">
    <col style="width:20%">
    <col style="width:10%">
  </colgroup>
  <thead>
    <tr>
      <th style="text-align: center;">Account Name</th>
      <th style="text-align: center;">Description</th>
      <th style="text-align: center;">Debit Amount</th>
      <th style="text-align: center;">Credit Amount</th>
      <th></th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
</div>

<!-- ================= TOTAL ROW (FIXED) ================= -->
<table class="wd-table" style="width:100%; table-layout:fixed; margin-top:0;">
  <colgroup>
    <col style="width:20%">
    <col style="width:30%">
    <col style="width:20%">
    <col style="width:20%">
    <col style="width:10%">
  </colgroup>
  <tbody>
    <tr style="background:#f0f0f0; font-weight:bold;">
        <td style="text-align:Left;">TOTAL</td>

        <td class="amount" id="CELL_JournalEntries_Total2">0</td>

</table>

<!-- ===== SUMMARY PANEL ===== -->
<div style="display:flex; justify-content:flex-end; margin-top:18px; align-items:center; gap:32px;">
  <div class="form-actions">
    <button class="btn-primary">Save & New ✅</button>
    <button class="btn-primary">Clear 🔁</button>
    <button class="btn-secondary">Close ✖️</button>
  </div>
</div>
