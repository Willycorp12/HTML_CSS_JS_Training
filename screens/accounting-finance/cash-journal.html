<div class="cash-journal-screen">

    </div>

    <div class="table-scroll-wrapper">
        <table class="wd-table">
            <colgroup>

                <col style="width: 9%" />
                <col style="width: 9%" />
                <col style="width: 9%" />
            </colgroup>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Ref</th>
                    <th>Description</th>
                    <th>Cash Inflow</th>
                    <th>Cash Outflow</th>
                    <th>Balance</th>
                </tr>
            </thead>
            <tbody id="CJ_TableBody">
                <!-- More rows would be dynamically added here -->
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="4" style="text-align: left; font-weight: bold;">Sum</td>
                    <td class="amount" id="CJ_TotalInflow">0</td>
                    <td class="amount" id="CJ_TotalOutflow">0</td>
                    <td class="amount" id="CJ_FooterBalance">0</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <!-- Footer Section -->
    <div class="cj-footer">
        <button class="wd-btn">Print <i class="fa-solid fa-print"></i></button>
        <div class="cj-current-balance">
            Current Account Balance: <span class="amount-display">43,207 FCFA</span>
        </div>
