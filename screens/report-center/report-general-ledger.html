<div class="report-screen-wrapper">
    <!-- Header Section -->
    <div class="report-header-section">
        <!-- Left: Date Controls -->
        <div class="report-header-left">
            <div class="form-row compact">
                <label>From:</label>
                <input type="date" id="GL_DateFrom" class="wd-input date-small" value="2025-10-01" onchange="syncGlDates()">
                <span class="label-sub">Batch/Year:</span>
            </div>
            <div class="form-row compact">
                <label>To:</label>
                <input type="date" id="GL_DateTo" class="wd-input date-small" value="2026-09-30" onchange="syncGlDates()">
                <select class="wd-input"><option>Finance Year 2026</option></select>
            </div>
        </div>

        <!-- Center: Title -->
        <div class="report-header-center">
            <div class="company-title">BIAKA HOSPITAL</div>
            <div class="report-main-title">General Ledger for the Period</div>
            <div class="report-separator-line"></div>
            <div class="report-sub-title" id="GL_Subtitle">1 October 2025 To 30 September 2026.</div>
        </div>

        <!-- Right: Actions & Format -->
        <div class="report-header-right">
            <div class="gl-top-actions">
                <button class="wd-btn primary print-action-btn" onclick="printGeneralLedger()">Print <i class="fa-solid fa-print"></i></button>
                <fieldset class="report-format-group">
                    <legend>Display Format</legend>
                    <label><input type="radio" name="gl_fmt" value="advance" checked onchange="changeGlFormat('advance')"> Advance Format</label>
                    <label><input type="radio" name="gl_fmt" value="simple" onchange="changeGlFormat('simple')"> Simple Format</label>
                </fieldset>
            </div>
            <div class="live-datetime-display">
                <div id="GL_CurrentDate">03/23/2026</div>
                <div id="GL_CurrentTime">17:35</div>
            </div>
        </div>
    </div>

    <!-- Toolbar/Filter -->
    <div class="report-toolbar">
        <div class="search-wrapper" style="flex: 1; display: flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-magnifying-glass" style="color: #2e3192;"></i>
            <input type="text" class="global-search" placeholder="Search by Account Name..." style="flex: 1;">
        </div>
    </div>

    <!-- Table -->
    <div class="table-scroll-wrapper">
        <table class="wd-table blue-header" id="GL_Table">
            <colgroup id="GL_Colgroup_Main"></colgroup>
            <thead id="GL_Thead">
                <!-- Injected by JS -->
            </thead>
            <tbody id="GL_Tbody">
                <!-- Injected by JS -->
            </tbody>
        </table>
    </div>

    <!-- Fixed Footer for Totals -->
    <div class="report-footer" id="GL_ReportFooter">
        <table class="wd-table footer-table" id="GL_FooterTable">
            <colgroup id="GL_Colgroup_Footer"></colgroup>
            <tfoot id="GL_Tfoot"></tfoot>
        </table>
    </div>
</div>
