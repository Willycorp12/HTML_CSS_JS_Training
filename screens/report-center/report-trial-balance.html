<div class="report-screen-wrapper">
    <!-- Header Section (Custom layout for reports) -->
    <!-- Modeled after paylist-cnps.html header style for consistency -->
    <div class="report-header-section">
        <!-- Left: Date Controls -->
        <div class="report-header-left">
            <div class="form-row compact">
                <label>From:</label>
                <input type="date" id="TB_DateFrom" class="wd-input date-small" value="2025-10-01" onchange="syncTbDates()">
                <span class="label-sub">Batch/Year:</span>
            </div>
            <div class="form-row compact">
                <label>To:</label>
                <input type="date" id="TB_DateTo" class="wd-input date-small" value="2026-09-30" onchange="syncTbDates()">

            </div>
        </div>

        <!-- Center: Title -->
        <div class="report-header-center">
            <div class="company-title">BIAKA HOSPITAL</div>

            <div class="report-separator-line"></div>
            <div class="report-sub-title" id="TB_Subtitle">Loading dates...</div>
        </div>

        <div class="report-header-right">
            <button class="wd-btn primary print-action-btn" onclick="printTrialBalanceReport()">Print Report <i class="fa-solid fa-print"></i></button>
            <fieldset class="report-format-group">
                <legend>Trial.Bal.Formats</legend>

            </fieldset>
        </div>

    <!-- Toolbar/Filter -->
    <div class="report-toolbar">
        <select class="wd-input" style="width: 160px;"><option>This Academic Year</option></select>
        <input type="text" class="global-search" placeholder="Search by Account Name...">
    </div>

    <!-- Table -->
    <div class="table-scroll-wrapper">
        <table class="wd-table blue-header" id="TB_Table">
            <colgroup id="TB_Colgroup_Main"></colgroup>
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Fixed Footer for Totals -->
    <div class="report-footer">
        <table class="wd-table footer-table">
            <colgroup id="TB_Colgroup_Footer"></colgroup>
            <tfoot id="TB_Tfoot"></tfoot>
        </table>
    </div>
</div>
