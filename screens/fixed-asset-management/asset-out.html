<!-- screens/asset-out.html -->
<div class="asset-modal-overlay">
    <div class="asset-modal-box">
    <div class="blue-title-bar" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;">
        <div style="flex: 1; text-align: center;">Check-Out an Asset</div>
        <div style="font-size: 22px; color: #fff; opacity: 0.8; cursor: pointer; line-height: 1;" onclick="loadScreen('asset-master.html')">&times;</div>
    </div>
    <div class="content-frame">
            <div class="top-section-layout">
                <!-- Left Panel: Check-out To -->
                <fieldset class="group-box checkout-to-panel">
                    <legend>Check-out To:</legend>
                    <div class="form-group">
                        <label>Scan Badge:</label>
                        <input type="text" id="out-scan-badge" class="wd-input">
                    </div>
                    <div class="form-group" style="margin-top: 10px;">
                        <label class="label-link">or Select Person</label>
                        <select id="out-select-person" class="wd-input">
                            <option value="1">Person 1</option>
                            <option value="2">Person 2</option>
                        </select>
                    </div>
                </fieldset>

                <!-- Right Panel: Items to Check-Out -->
                <fieldset class="group-box items-to-checkout-panel">
                    <legend>Items to Check-Out:</legend>
                    <div class="toolbar-row flex-end">
                        <input type="text" id="out-asset-search" class="wd-input" placeholder="Click to add Asset..." style="width: 250px; border: 1px solid #000; cursor: pointer;" readonly>
                    </div>
                    <div class="table-wrapper">
                        <table class="wd-table blue-header" id="TABLE_AssetOut">
                            <thead>
                                <tr>
                                    <th style="width: 100px;">Asset Number</th>
                                    <th>Description</th>
                                    <th style="width: 120px;">Check Out Status</th> <!-- This column seems to contain the delete link -->
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Dynamic Rows will be injected here by renderCheckoutTable -->
                            </tbody>
                        </table>
                    </div>
                </fieldset>
            </div>

            <div class="bottom-section-layout">
                <div class="left-controls">
                    <div class="form-row">
                        <label style="font-weight: bold;">Due Date:</label>
                        <input type="date" id="out-due-date" class="wd-input" style="width: 150px;" value="2026-04-10">
                    </div>
                    <div class="link-group">
                        <label>Location:</label>
                        <a href="#" class="black-link">VC Office</a>
                    </div>
                    <div class="link-group">
                        <label>Status:</label>
                        <a href="#" class="black-link">In Use</a>
                    </div>
                </div>
                
                <div class="middle-comments">
                    <label>Comments</label>
                    <textarea id="out-comments" class="wd-input" rows="4"></textarea>
                </div>

                <div class="footer-actions">
                    <button class="wd-btn primary" id="btn-do-checkout" style="width: 130px; justify-content: space-between;">
                        Check-Out <i class="fa-solid fa-circle-check" style="color: #2e3192;"></i>
                    </button>
                    <button class="wd-btn danger" id="btn-cancel-checkout" style="width: 130px; justify-content: space-between;">
                        Cancel <i class="fa-solid fa-xmark" style="color: #cd2027;"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
