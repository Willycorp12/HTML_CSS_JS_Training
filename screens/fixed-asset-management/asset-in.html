<!-- screens/asset-in.html -->
<div class="asset-modal-overlay">
    <div class="asset-modal-box">
        <div class="blue-title-bar" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;">
            <div style="flex: 1; text-align: center;">Check-In an Asset</div>
            <div style="font-size: 22px; color: #fff; opacity: 0.8; cursor: pointer; line-height: 1;" onclick="loadScreen('asset-master.html')">&times;</div>
        </div>
        <div class="content-frame">
            <fieldset class="group-box">
                <legend>Items to Check-In:</legend>
                
                <div class="toolbar-row flex-end">
                    <label>Select Person:</label>
                    <select id="in-select-person" class="wd-input" style="width: 200px; background: #fff;">
                        <option value="">--Select a Personnel--</option> <!-- Placeholder with empty value -->
                        <option value="1">Person 1</option>
                        <option value="2">Person 2</option>
                    </select>
                </div>

                <div class="table-wrapper">
                    <table class="wd-table blue-header" id="TABLE_AssetIn">
                        <thead>
                            <tr>
                                <th style="width: 30px;"><i class="fa-solid fa-check-double"></i></th>
                                <th style="width: 40px;">No</th>
                                <th>Description</th>
                                <th style="width: 100px;">Checked Out</th>
                                <th style="width: 100px;">Due Date</th>
                                <th>Custodian</th>
                                <th style="width: 60px;">Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </fieldset>

            <div class="footer-layout">
                <div class="footer-links">
                    <div class="link-group">
                        <label>Location:</label>
                        <a href="#" class="black-link" id="IN_LocationLink">VC Office</a>
                    </div>
                    <div class="link-group">
                        <label>Status:</label>
                        <a href="#" class="black-link" id="IN_StatusLink">In Use</a>
                    </div>
                </div>
                <div class="footer-comments">
                    <label>Comments</label>
                    <textarea id="in-comments" class="wd-input" rows="3"></textarea>
                </div>
                <div class="footer-actions">
                    <button class="wd-btn primary" id="btn-do-checkin" style="width: 130px; justify-content: space-between;">
                        Check-In <i class="fa-solid fa-circle-check" style="color: #2e3192;"></i>
                    </button>
                    <button class="wd-btn danger" id="btn-cancel-checkin" style="width: 130px; justify-content: space-between;">
                        Cancel <i class="fa-solid fa-xmark" style="color: #cd2027;"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style id="asset-in-out-styles">
